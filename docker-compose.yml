services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./content:/app/content
    environment:
      - APP_NAME=Wormix-Like API
      - ENVIRONMENT=development

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - server
